<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>Suivi Présences</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161920;--bg3:#1e2330;--bg4:#252b3b;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8eaf0;--text2:#8892a4;--text3:#5a6478;
  --accent:#3d7eff;--accent2:#2563eb;
  --green:#22c55e;--gbg:rgba(34,197,94,0.1);--gb:rgba(34,197,94,0.3);
  --red:#f87171;--rbg:rgba(248,113,113,0.1);--rb:rgba(248,113,113,0.3);
  --amber:#fbbf24;--r:10px;--rl:14px;
}
/* THEME CLAIR */
[data-theme="light"]{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#f3f4f6;--bg4:#e5e7eb;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --text:#111827;--text2:#4b5563;--text3:#9ca3af;
  --accent:#2563eb;--accent2:#1d4ed8;
  --green:#16a34a;--gbg:rgba(22,163,74,0.08);--gb:rgba(22,163,74,0.25);
  --red:#dc2626;--rbg:rgba(220,38,38,0.08);--rb:rgba(220,38,38,0.25);
  --amber:#d97706;
}
/* THEME BLEU */
[data-theme="blue"]{
  --bg:#0d1b2e;--bg2:#102040;--bg3:#163058;--bg4:#1e3a6e;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#e2eeff;--text2:#7aa2cc;--text3:#4a6a8a;
  --accent:#60a5fa;--accent2:#3b82f6;
  --green:#34d399;--gbg:rgba(52,211,153,0.1);--gb:rgba(52,211,153,0.3);
  --red:#f87171;--rbg:rgba(248,113,113,0.1);--rb:rgba(248,113,113,0.3);
  --amber:#fbbf24;
}
/* THEME VERT */
[data-theme="green"]{
  --bg:#0a1a0f;--bg2:#0f2418;--bg3:#163021;--bg4:#1e3d2b;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#dcfce7;--text2:#6db88a;--text3:#3d6b50;
  --accent:#4ade80;--accent2:#22c55e;
  --green:#4ade80;--gbg:rgba(74,222,128,0.1);--gb:rgba(74,222,128,0.3);
  --red:#f87171;--rbg:rgba(248,113,113,0.1);--rb:rgba(248,113,113,0.3);
  --amber:#fbbf24;
}
/* THEME VIOLET */
[data-theme="purple"]{
  --bg:#0f0a1e;--bg2:#160f2e;--bg3:#1e1640;--bg4:#271e52;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#ede9fe;--text2:#8b78cc;--text3:#5a4a8a;
  --accent:#a78bfa;--accent2:#7c3aed;
  --green:#34d399;--gbg:rgba(52,211,153,0.1);--gb:rgba(52,211,153,0.3);
  --red:#f87171;--rbg:rgba(248,113,113,0.1);--rb:rgba(248,113,113,0.3);
  --amber:#fbbf24;
}

/* theme card styles */
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
.theme-card{border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .2s;user-select:none}
.theme-card:hover{transform:translateY(-2px)}
.theme-card.selected{border-color:var(--accent)}
.theme-card .tc-preview{width:100%;height:44px;border-radius:7px;margin-bottom:8px;display:flex;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
.theme-card .tc-preview .s{flex:0 0 35%;border-right:1px solid rgba(255,255,255,0.1)}
.theme-card .tc-preview .m{flex:1}
.theme-card .tc-name{font-size:12px;font-weight:600;color:var(--text)}
.theme-card .tc-check{font-size:16px;margin-top:4px}
.settings-section{margin-bottom:28px}
.settings-section-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;font-size:14px;overflow:hidden}

/* LAYOUT */
.app{display:flex;height:100vh}
.sidebar{width:230px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-header{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.logo{font-size:15px;font-weight:700}.logo span{color:var(--accent)}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px}
.sb-nav{flex:1;overflow-y:auto;padding:8px}
.nav-lbl{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;border:1px solid transparent;transition:all .15s;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.nav-item .badge{margin-left:auto;font-size:10px;background:var(--bg3);color:var(--text3);padding:1px 6px;border-radius:10px}
.sb-footer{padding:12px;border-top:1px solid var(--border)}
.btn-new{width:100%;padding:9px;background:var(--accent);border:none;color:#fff;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-new:hover{background:var(--accent2)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:50px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600}
.topbar-date{margin-left:auto;font-size:12px;color:var(--text3)}
.content{flex:1;overflow-y:auto;padding:22px 24px}

/* SCREENS */
.screen{display:none}.screen.active{display:block}

/* HOME */
.empty-home{text-align:center;padding:70px 20px}
.empty-icon{font-size:52px;margin-bottom:16px}
.empty-home h2{font-size:20px;font-weight:600;margin-bottom:8px}
.empty-home p{color:var(--text2);max-width:340px;margin:0 auto 22px;line-height:1.6}
.projs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.proj-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;cursor:pointer;transition:all .18s}
.proj-card:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-1px)}
.proj-name{font-size:15px;font-weight:600;margin-bottom:4px}
.proj-desc{font-size:12px;color:var(--text2);margin-bottom:12px;min-height:16px;line-height:1.5}
.proj-footer{display:flex;gap:7px;flex-wrap:wrap}
.pill{font-size:11px;padding:2px 9px;border-radius:20px}
.pill-blue{background:rgba(61,126,255,.12);color:#6fa3ff;border:1px solid rgba(61,126,255,.2)}
.pill-green{background:var(--gbg);color:var(--green);border:1px solid var(--gb)}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg2);padding:4px;border-radius:10px;width:fit-content;margin-bottom:20px}
.tab{padding:7px 15px;border-radius:7px;font-size:13px;cursor:pointer;color:var(--text2);border:none;background:none;font-family:inherit;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--bg4);color:var(--text);border:1px solid var(--border2)}
.tc{display:none}.tc.active{display:block}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px}
.sc-n{font-size:26px;font-weight:700;margin-bottom:1px}
.sc-l{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.sc.green{border-color:var(--gb)}.sc.green .sc-n{color:var(--green)}
.sc.red{border-color:var(--rb)}.sc.red .sc-n{color:var(--red)}
.sc.blue .sc-n{color:#6fa3ff}.sc.amber .sc-n{color:var(--amber)}

/* PARTICIPANTS */
.sec-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:10px}
.part-list{display:flex;flex-direction:column;gap:7px}
.part-row{display:flex;align-items:center;gap:13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:11px 15px;transition:border-color .15s}
.part-row.present{border-left:3px solid var(--green)}
.part-row.absent{border-left:3px solid var(--red)}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.pname{flex:1;font-size:14px;font-weight:500}
.pstatus{font-size:11px;color:var(--text3)}
.pstatus.present{color:var(--green)}.pstatus.absent{color:var(--red)}
.btn-grp{display:flex;gap:6px}
.bp,.ba{padding:6px 13px;border-radius:7px;border:1px solid;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.bp{background:transparent;border-color:var(--gb);color:var(--green)}
.bp:hover,.bp.active{background:var(--gbg);border-color:var(--green)}
.ba{background:transparent;border-color:var(--rb);color:var(--red)}
.ba:hover,.ba.active{background:var(--rbg);border-color:var(--red)}

/* FORM */
.form-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:22px;max-width:540px}
.form-title{font-size:17px;font-weight:700;margin-bottom:18px}
.fg{margin-bottom:15px}
.fl{font-size:12px;color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.05em}
.fi{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--accent)}
.fi::placeholder{color:var(--text3)}
.parts-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.pi-row{display:flex;align-items:center;gap:9px;padding:9px 12px;border-bottom:1px solid var(--border)}
.pi-row:last-child{border-bottom:none}
.pi-name{flex:1;font-size:13px}
.btn-rm{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 4px;transition:color .15s}
.btn-rm:hover{color:var(--red)}
.add-row{display:flex;gap:8px;padding:8px 12px;border-top:1px solid var(--border)}
.add-row .fi{flex:1}
.btn-add{padding:9px 15px;background:var(--accent);border:none;color:#fff;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;flex-shrink:0;font-family:inherit;transition:background .15s}
.btn-add:hover{background:var(--accent2)}
.btn-submit{width:100%;padding:11px;background:var(--accent);border:none;color:#fff;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;transition:background .15s}
.btn-submit:hover{background:var(--accent2)}
.btn-submit:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed}
.btn-sec{padding:8px 15px;background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s}
.btn-sec:hover{background:var(--bg3);color:var(--text)}
.btn-danger{padding:8px 15px;background:transparent;border:1px solid var(--rb);color:var(--red);border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s}
.btn-danger:hover{background:var(--rbg)}

/* HISTORY */
.df{display:flex;gap:9px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.df .fi{width:auto}
.hblock{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.hhead{padding:9px 15px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px}
.hrow{display:flex;align-items:center;gap:11px;padding:9px 15px;border-bottom:1px solid var(--border)}
.hrow:last-child{border-bottom:none}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.present{background:var(--green)}.dot.absent{background:var(--red)}.dot.none{background:var(--text3)}
.hname{flex:1;font-size:13px}
.hst{font-size:12px;font-weight:600}
.hst.present{color:var(--green)}.hst.absent{color:var(--red)}.hst.none{color:var(--text3)}

/* STATS TABLE */
.stbl{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.st-row{display:flex;align-items:center;gap:13px;padding:10px 15px;border-bottom:1px solid var(--border)}
.st-row:last-child{border-bottom:none}
.st-name{width:150px;flex-shrink:0;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bw{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.bf{height:100%;background:var(--green);border-radius:3px;transition:width .4s}
.st-pct{width:40px;text-align:right;font-size:12px;color:var(--text2)}
.st-nums{display:flex;gap:8px;font-size:11px}
.stp{color:var(--green);font-weight:600}.sta{color:var(--red);font-weight:600}

/* MISC */
.empty{text-align:center;padding:36px;color:var(--text3);font-size:13px}
.toast{position:fixed;bottom:22px;right:22px;background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:999}
.toast.show{opacity:1}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-header">
      <div class="logo">Suivi <span>Présences</span></div>
      <div class="logo-sub">Base de données locale</div>
    </div>
    <div class="sb-nav">
      <div class="nav-lbl">Navigation</div>
      <div class="nav-item active" id="nav-home" onclick="goHome()">🏠 <span>Accueil</span></div>
      <div class="nav-lbl" style="margin-top:8px">Projets</div>
      <div id="nav-projects"></div>
      <div class="nav-lbl" style="margin-top:8px">Application</div>
      <div class="nav-item" id="nav-global-settings" onclick="showGlobalSettings()">⚙️ <span>Paramètres</span></div>
    </div>
    <div class="sb-footer">
      <button class="btn-new" onclick="showNewProject()">+ Nouveau projet</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbar-title">Tableau de bord</span>
      <span class="topbar-date" id="topbar-date"></span>
    </div>
    <div class="content">

      <!-- HOME -->
      <div id="s-home" class="screen active"><div id="home-content"></div></div>

      <!-- NEW PROJECT -->
      <div id="s-new" class="screen">
        <div class="form-card">
          <div class="form-title">Nouveau projet</div>
          <div class="fg">
            <label class="fl">Nom du projet *</label>
            <input class="fi" id="inp-nom" placeholder="Ex: Chantier route, Formation RH…" />
          </div>
          <div class="fg">
            <label class="fl">Description (optionnel)</label>
            <input class="fi" id="inp-desc" placeholder="Brève description…" />
          </div>
          <div class="fg">
            <label class="fl">Participants * <span id="parts-count" style="color:var(--text3);font-weight:400">(0 ajouté)</span></label>
            <div class="parts-box">
              <div id="new-parts-list"></div>
              <div class="add-row">
                <input class="fi" id="inp-part" placeholder="Nom du participant" onkeydown="if(event.key==='Enter'){event.preventDefault();addNewPart()}" />
                <button class="btn-add" type="button" onclick="addNewPart()">+ Ajouter</button>
              </div>
            </div>
          </div>
          <button class="btn-submit" id="btn-create" type="button" onclick="createProject()">✓ Créer le projet</button>
        </div>
      </div>

      <!-- PROJECT VIEW -->
      <div id="s-project" class="screen">
        <div class="tabs">
          <button class="tab active" onclick="swTab('today',this)">Aujourd'hui</button>
          <button class="tab" onclick="swTab('history',this)">Historique</button>
          <button class="tab" onclick="swTab('stats',this)">Statistiques</button>
          <button class="tab" onclick="swTab('settings',this)">Paramètres</button>
        </div>
        <div id="tc-today"    class="tc active"></div>
        <div id="tc-history"  class="tc"></div>
        <div id="tc-stats"    class="tc"></div>
        <div id="tc-settings" class="tc"></div>
      </div>

      <!-- GLOBAL SETTINGS -->
      <div id="s-global-settings" class="screen">
        <div style="max-width:560px">
          <div class="settings-section">
            <div class="settings-section-title">🎨 Thème de l'application</div>
            <div class="theme-grid" id="theme-grid"></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ══ STATE ════════════════════════════════════════════════════════════════════
let currentProjectId = null;
let newParts = [];

// ══ HELPERS ══════════════════════════════════════════════════════════════════
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) { if(!d) return ''; const [y,m,j]=d.split('-'); return `${j}/${m}/${y}`; }
function getInitials(n) { return n.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }

const AV = [['#1e3a5f','#6fa3ff'],['#1a3a2a','#22c55e'],['#3a1a1a','#f87171'],
            ['#2d2a0f','#fbbf24'],['#2a1a3a','#c084fc'],['#1a3535','#2dd4bf']];
function avStyle(n) { let h=0; for(let c of n) h=(h*31+c.charCodeAt(0))%AV.length; return `background:${AV[h][0]};color:${AV[h][1]}`; }

function toast(msg, dur=2800) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), dur);
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function setActiveNav(id) {
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById(id); if(el) el.classList.add('active');
}
function updateDate() {
  document.getElementById('topbar-date').textContent =
    new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

// ══ THEMES ═══════════════════════════════════════════════════════════════════
const THEMES = [
  { id:'dark',   name:'Sombre',  sidebar:'#161920', main:'#0f1117', accent:'#3d7eff' },
  { id:'light',  name:'Clair',   sidebar:'#ffffff', main:'#f0f2f5', accent:'#2563eb' },
  { id:'blue',   name:'Bleu',    sidebar:'#102040', main:'#0d1b2e', accent:'#60a5fa' },
  { id:'green',  name:'Vert',    sidebar:'#0f2418', main:'#0a1a0f', accent:'#4ade80' },
  { id:'purple', name:'Violet',  sidebar:'#160f2e', main:'#0f0a1e', accent:'#a78bfa' },
];

function applyTheme(themeId) {
  document.documentElement.setAttribute('data-theme', themeId === 'dark' ? '' : themeId);
  localStorage.setItem('presence-theme', themeId);
}

function loadSavedTheme() {
  const saved = localStorage.getItem('presence-theme') || 'dark';
  applyTheme(saved);
}

function renderThemeGrid() {
  const current = localStorage.getItem('presence-theme') || 'dark';
  document.getElementById('theme-grid').innerHTML = THEMES.map(t => `
    <div class="theme-card ${current===t.id?'selected':''}" onclick="selectTheme('${t.id}')" id="tcard-${t.id}">
      <div class="tc-preview">
        <div class="s" style="background:${t.sidebar}"></div>
        <div class="m" style="background:${t.main}"></div>
      </div>
      <div class="tc-name">${t.name}</div>
      <div class="tc-check">${current===t.id?'✓':''}</div>
    </div>`).join('');
}

function selectTheme(themeId) {
  applyTheme(themeId);
  renderThemeGrid();
  toast('Thème "' + THEMES.find(t=>t.id===themeId)?.name + '" appliqué');
}

function showGlobalSettings() {
  currentProjectId = null;
  document.getElementById('topbar-title').textContent = 'Paramètres';
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  document.getElementById('nav-global-settings').classList.add('active');
  showScreen('s-global-settings');
  renderThemeGrid();
}

// ══ INIT ══════════════════════════════════════════════════════════════════════
loadSavedTheme();
updateDate();
setInterval(updateDate, 60000);
loadHome();

async function loadHome() {
  await renderNavProjects();
  renderHome();
}

// ══ HOME ══════════════════════════════════════════════════════════════════════
function goHome() {
  currentProjectId=null;
  document.getElementById('topbar-title').textContent='Tableau de bord';
  setActiveNav('nav-home');
  showScreen('s-home');
  renderHome();
}

async function renderHome() {
  const projets = await window.api.getProjets();
  const el = document.getElementById('home-content');
  if(!projets.length) {
    el.innerHTML=`<div class="empty-home">
      <div class="empty-icon">📋</div>
      <h2>Aucun projet pour l'instant</h2>
      <p>Créez votre premier projet pour commencer à suivre les présences.</p>
      <button class="btn-submit" style="width:auto;padding:11px 28px" onclick="showNewProject()">+ Créer un projet</button>
    </div>`;
    return;
  }
  el.innerHTML=`<div class="sec-lbl" style="margin-bottom:14px">Projets actifs — ${projets.length}</div>
  <div class="projs-grid">${projets.map(p=>`
    <div class="proj-card" onclick="openProject(${p.id})">
      <div class="proj-name">${p.nom}</div>
      <div class="proj-desc">${p.description||'—'}</div>
      <div class="proj-footer">
        <span class="pill pill-blue">${p.participants.length} participant${p.participants.length>1?'s':''}</span>
        <span class="pill pill-green">${p.nb_jours} jour${p.nb_jours>1?'s':''}</span>
      </div>
    </div>`).join('')}</div>`;
}

async function renderNavProjects() {
  const projets = await window.api.getProjets();
  const el = document.getElementById('nav-projects');
  if(!projets.length) { el.innerHTML='<div style="padding:4px 8px;font-size:12px;color:var(--text3)">Aucun projet</div>'; return; }
  el.innerHTML=projets.map(p=>`
    <div class="nav-item ${currentProjectId===p.id?'active':''}" id="navp-${p.id}" onclick="openProject(${p.id})">
      📁 <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.nom}</span>
      <span class="badge">${p.participants.length}</span>
    </div>`).join('');
}

// ══ NEW PROJECT ═══════════════════════════════════════════════════════════════
function showNewProject() {
  newParts=[];
  document.getElementById('inp-nom').value='';
  document.getElementById('inp-desc').value='';
  document.getElementById('inp-part').value='';
  document.getElementById('new-parts-list').innerHTML='';
  document.getElementById('parts-count').textContent='(0 ajouté)';
  const btn=document.getElementById('btn-create');
  btn.textContent='✓ Créer le projet'; btn.disabled=false;
  document.getElementById('topbar-title').textContent='Nouveau projet';
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  showScreen('s-new');
  setTimeout(()=>document.getElementById('inp-nom').focus(), 100);
}

function addNewPart() {
  const inp=document.getElementById('inp-part');
  const nom=inp.value.trim();
  if(!nom) { inp.focus(); return; }
  // eviter les doublons
  if(newParts.find(p=>p.nom.toLowerCase()===nom.toLowerCase())) {
    toast('Ce participant est déjà dans la liste.'); inp.value=''; inp.focus(); return;
  }
  newParts.push({ id: Date.now()+'_'+Math.random(), nom });
  inp.value='';
  renderNewParts();
  inp.focus();
}

function removeNewPart(id) {
  newParts=newParts.filter(p=>p.id!==id);
  renderNewParts();
}

function renderNewParts() {
  document.getElementById('parts-count').textContent=`(${newParts.length} ajouté${newParts.length>1?'s':''})`;
  document.getElementById('new-parts-list').innerHTML=newParts.map(p=>`
    <div class="pi-row">
      <div class="av" style="${avStyle(p.nom)};width:28px;height:28px;font-size:10px">${getInitials(p.nom)}</div>
      <div class="pi-name">${p.nom}</div>
      <button class="btn-rm" type="button" onclick="removeNewPart('${p.id}')">×</button>
    </div>`).join('');
}

async function createProject() {
  const nom=document.getElementById('inp-nom').value.trim();
  if(!nom) { toast('Veuillez entrer un nom de projet.'); document.getElementById('inp-nom').focus(); return; }
  if(!newParts.length) { toast('Ajoutez au moins un participant avant de créer.'); return; }

  const btn=document.getElementById('btn-create');
  btn.textContent='Création en cours…'; btn.disabled=true;

  try {
    const res = await window.api.createProjet({
      nom,
      description: document.getElementById('inp-desc').value.trim(),
      participants: newParts.map(p=>p.nom)
    });

    if(!res || !res.success || !res.id) {
      toast('Erreur lors de la création : '+(res?.error||'réponse invalide'));
      btn.textContent='✓ Créer le projet'; btn.disabled=false;
      return;
    }

    newParts=[];
    await renderNavProjects();
    await openProject(res.id);
    toast('✓ Projet créé avec succès !');

  } catch(e) {
    console.error('createProject error:', e);
    toast('Erreur : '+e.message);
    btn.textContent='✓ Créer le projet'; btn.disabled=false;
  }
}

// ══ OPEN PROJECT ══════════════════════════════════════════════════════════════
async function openProject(id) {
  currentProjectId=id;
  const projets=await window.api.getProjets();
  const p=projets.find(x=>x.id===id);
  if(!p) return;
  document.getElementById('topbar-title').textContent=p.nom;
  await renderNavProjects();
  setActiveNav(`navp-${id}`);
  // reset tabs
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===0));
  document.querySelectorAll('.tc').forEach((t,i)=>t.classList.toggle('active',i===0));
  showScreen('s-project');
  await renderToday();
}

// ══ TABS ══════════════════════════════════════════════════════════════════════
async function swTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tc').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`tc-${name}`).classList.add('active');
  if(name==='today')    await renderToday();
  if(name==='history')  await renderHistory();
  if(name==='stats')    await renderStats();
  if(name==='settings') await renderSettings();
}

// ══ TODAY ═════════════════════════════════════════════════════════════════════
async function renderToday() {
  const data=await window.api.getPresencesJour({projet_id:currentProjectId, date:today()});
  const present=data.filter(p=>p.statut==='present').length;
  const absent =data.filter(p=>p.statut==='absent').length;
  const pct=data.length?Math.round(present/data.length*100):0;
  document.getElementById('tc-today').innerHTML=`
    <div class="stats-row">
      <div class="sc blue"><div class="sc-n">${data.length}</div><div class="sc-l">Total</div></div>
      <div class="sc green"><div class="sc-n">${present}</div><div class="sc-l">Présents</div></div>
      <div class="sc red"><div class="sc-n">${absent}</div><div class="sc-l">Absents</div></div>
      <div class="sc amber"><div class="sc-n">${pct}%</div><div class="sc-l">Taux présence</div></div>
    </div>
    <div class="sec-lbl">Marquer les présences — ${fmtDate(today())}</div>
    <div class="part-list">${data.map(p=>`
      <div class="part-row ${p.statut||''}" id="row-${p.id}">
        <div class="av" style="${avStyle(p.nom)}">${getInitials(p.nom)}</div>
        <div style="flex:1">
          <div class="pname">${p.nom}</div>
          <div class="pstatus ${p.statut||''}" id="ps-${p.id}">${p.statut==='present'?'Présent':p.statut==='absent'?'Absent':'Non marqué'}</div>
        </div>
        <div class="btn-grp">
          <button class="bp ${p.statut==='present'?'active':''}" id="bp-${p.id}" onclick="mark(${p.id},'present')">✓ Présent</button>
          <button class="ba ${p.statut==='absent'?'active':''}"  id="ba-${p.id}" onclick="mark(${p.id},'absent')">✗ Absent</button>
        </div>
      </div>`).join('')}
    </div>`;
}

async function mark(participantId, statut) {
  await window.api.marquerPresence({participant_id:participantId, projet_id:currentProjectId, date:today(), statut});
  document.getElementById(`row-${participantId}`).className=`part-row ${statut}`;
  const ps=document.getElementById(`ps-${participantId}`);
  ps.className=`pstatus ${statut}`; ps.textContent=statut==='present'?'Présent':'Absent';
  document.getElementById(`bp-${participantId}`).className=`bp ${statut==='present'?'active':''}`;
  document.getElementById(`ba-${participantId}`).className=`ba ${statut==='absent'?'active':''}`;
  // refresh counters
  const data=await window.api.getPresencesJour({projet_id:currentProjectId, date:today()});
  const pres=data.filter(p=>p.statut==='present').length;
  const abs =data.filter(p=>p.statut==='absent').length;
  const pct=data.length?Math.round(pres/data.length*100):0;
  document.querySelector('.sc.blue .sc-n').textContent=data.length;
  document.querySelector('.sc.green .sc-n').textContent=pres;
  document.querySelector('.sc.red .sc-n').textContent=abs;
  document.querySelector('.sc.amber .sc-n').textContent=pct+'%';
}

// ══ HISTORY ═══════════════════════════════════════════════════════════════════
async function renderHistory() {
  const jours=await window.api.getJoursDisponibles(currentProjectId);
  document.getElementById('tc-history').innerHTML=`
    <div class="df">
      <input type="date" class="fi" id="hist-date" value="${today()}" style="width:auto" />
      <button class="btn-sec" onclick="loadHistorique()">Afficher</button>
      <button class="btn-sec" onclick="doExportCSV()">↓ CSV</button>
      <button class="btn-sec" style="background:rgba(220,38,38,0.08);border-color:rgba(220,38,38,0.3);color:#f87171" onclick="doExportPDF()">📄 PDF</button>
    </div>
    ${jours.length?`<div class="sec-lbl" style="margin-bottom:12px">Jours enregistrés : ${jours.slice(0,8).map(d=>`<span style="color:var(--text2)">${fmtDate(d)}</span>`).join(', ')}${jours.length>8?'…':''}</div>`:''}
    <div id="hist-content"></div>`;
  await loadHistorique();
}

async function loadHistorique() {
  const date=document.getElementById('hist-date')?.value; if(!date) return;
  const data=await window.api.getHistoriqueDate({projet_id:currentProjectId, date});
  const el=document.getElementById('hist-content');
  const present=data.filter(p=>p.statut==='present');
  const absent =data.filter(p=>p.statut==='absent');
  const none   =data.filter(p=>!p.statut);
  const block=(title,list,cls)=>list.length?`
    <div class="hblock">
      <div class="hhead"><span class="dot ${cls}"></span>${title} — <strong>${list.length}</strong></div>
      ${list.map(p=>`<div class="hrow">
        <div class="av" style="${avStyle(p.nom)};width:28px;height:28px;font-size:10px">${getInitials(p.nom)}</div>
        <div class="dot ${cls}"></div>
        <div class="hname">${p.nom}</div>
        <div class="hst ${cls}">${cls==='present'?'Présent':cls==='absent'?'Absent':'—'}</div>
      </div>`).join('')}
    </div>`:''
  el.innerHTML = block('Présents',present,'present')+block('Absents',absent,'absent')+block('Non marqués',none,'none')
    || '<div class="empty">Aucun marquage pour cette date.</div>';
}

async function doExportCSV() {
  const res=await window.api.exportCSV(currentProjectId);
  if(res?.success) toast('✓ CSV exporté !'); 
}

async function doExportPDF() {
  const date=document.getElementById('hist-date')?.value;
  if(!date) { toast('Veuillez sélectionner une date.'); return; }
  const res=await window.api.exportPDF({projet_id:currentProjectId, date});
  if(res?.success) toast('✓ PDF exporté !');
}

// ══ STATS ═════════════════════════════════════════════════════════════════════
async function renderStats() {
  const stats=await window.api.getStats(currentProjectId);
  const el=document.getElementById('tc-stats');
  if(!stats.jours.length){el.innerHTML='<div class="empty">Aucune donnée disponible.</div>';return;}
  el.innerHTML=`
    <div class="stats-row" style="max-width:500px">
      <div class="sc blue"><div class="sc-n">${stats.jours.length}</div><div class="sc-l">Jours</div></div>
      <div class="sc"><div class="sc-n">${stats.participants.length}</div><div class="sc-l">Participants</div></div>
    </div>
    <div class="sec-lbl">Taux de présence par participant</div>
    <div class="stbl">${stats.participants.map(p=>{
      const pct=p.total?Math.round(p.present/p.total*100):0;
      return `<div class="st-row">
        <div class="av" style="${avStyle(p.nom)};width:28px;height:28px;font-size:10px;margin-right:2px">${getInitials(p.nom)}</div>
        <div class="st-name">${p.nom}</div>
        <div class="bw"><div class="bf" style="width:${pct}%"></div></div>
        <div class="st-pct">${pct}%</div>
        <div class="st-nums"><span class="stp">${p.present}P</span><span class="sta">${p.absent}A</span></div>
      </div>`;}).join('')}
    </div>
    <div style="margin-top:10px;font-size:11px;color:var(--text3)">Basé sur ${stats.jours.length} jour${stats.jours.length>1?'s':''} enregistré${stats.jours.length>1?'s':''}</div>`;
}

// ══ SETTINGS ══════════════════════════════════════════════════════════════════
async function renderSettings() {
  const projets=await window.api.getProjets();
  const p=projets.find(x=>x.id===currentProjectId); if(!p) return;
  document.getElementById('tc-settings').innerHTML=`
    <div class="form-card" style="max-width:500px">
      <div class="form-title">Paramètres du projet</div>
      <div class="fg"><label class="fl">Nom</label><input class="fi" value="${p.nom}" disabled /></div>
      <div class="fg">
        <label class="fl">Participants (${p.participants.length})</label>
        <div class="parts-box">
          <div id="stt-parts">${p.participants.map(par=>`
            <div class="pi-row" id="spi-${par.id}">
              <div class="av" style="${avStyle(par.nom)};width:28px;height:28px;font-size:10px">${getInitials(par.nom)}</div>
              <div class="pi-name">${par.nom}</div>
              <button class="btn-rm" onclick="removePart(${par.id},'${par.nom.replace(/'/g,"\\'")}')">×</button>
            </div>`).join('')}</div>
          <div class="add-row">
            <input class="fi" id="stt-inp" placeholder="Nouveau participant" onkeydown="if(event.key==='Enter')addPartToProject()" />
            <button class="btn-add" onclick="addPartToProject()">+ Ajouter</button>
          </div>
        </div>
      </div>
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);display:flex;gap:10px">
        <button class="btn-danger" onclick="deleteProject()">🗑 Supprimer ce projet</button>
      </div>
    </div>`;
}

async function removePart(id, nom) {
  if(!confirm(`Supprimer ${nom} ? Ses présences seront aussi supprimées.`)) return;
  await window.api.removeParticipant(id);
  document.getElementById(`spi-${id}`)?.remove();
  await renderNavProjects();
  toast(`${nom} supprimé`);
}

async function addPartToProject() {
  const inp=document.getElementById('stt-inp');
  const nom=inp.value.trim(); if(!nom) return;
  const res=await window.api.addParticipant({projet_id:currentProjectId, nom});
  inp.value='';
  const list=document.getElementById('stt-parts');
  const div=document.createElement('div');
  div.className='pi-row'; div.id=`spi-${res.id}`;
  div.innerHTML=`<div class="av" style="${avStyle(nom)};width:28px;height:28px;font-size:10px">${getInitials(nom)}</div><div class="pi-name">${nom}</div><button class="btn-rm" onclick="removePart(${res.id},'${nom.replace(/'/g,"\\'")}')">×</button>`;
  list.appendChild(div);
  await renderNavProjects();
  toast(`${nom} ajouté`);
}

async function deleteProject() {
  const projets=await window.api.getProjets();
  const p=projets.find(x=>x.id===currentProjectId);
  if(!confirm(`Supprimer le projet "${p?.nom}" ? Cette action est irréversible.`)) return;
  await window.api.deleteProjet(currentProjectId);
  await renderNavProjects();
  goHome();
  toast('Projet supprimé');
}
</script>
</body>
</html>
